<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ASBUH AUTOPILOT</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <script>
      // Apply theme before first paint to avoid a flash of the wrong theme.
      (function () {
        try {
          var stored = localStorage.getItem("theme"); // "light" | "dark" | "system" | null
          var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          var dark = stored === "dark" || ((!stored || stored === "system") && prefersDark);
          if (dark) document.documentElement.classList.add("dark");
        } catch (e) {
          /* ignore */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
